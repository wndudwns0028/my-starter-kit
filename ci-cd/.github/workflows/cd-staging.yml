name: CD - Staging 자동 배포 (GitOps)

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"

env:
  # GitHub Container Registry 사용 (AWS ECR로 전환 시 변경)
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-and-push:
    name: 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      sha-tag: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정 (멀티 아키텍처 빌드)
        uses: docker/setup-buildx-action@v3

      - name: 이미지 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: 빌드 및 GHCR 푸시 (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    name: K8s 매니페스트 이미지 태그 업데이트 (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: deployment.yaml 이미지 태그 업데이트
        run: |
          NEW_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          sed -i "s|image: .*devops-starter-api.*|image: ${NEW_TAG}|g" \
            kubernetes/base/deployment.yaml

      - name: 변경사항 커밋 및 푸시 (ArgoCD 자동 감지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/base/deployment.yaml
          git commit -m "ci: staging 이미지 태그 업데이트 (sha-${{ github.sha }})"
          git push
