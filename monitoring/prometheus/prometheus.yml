global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 알림 규칙 파일 로드
rule_files:
  - "rules/*.yaml"

# 스크레이핑 대상
scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI 앱 메트릭 (docker-compose 로컬 환경)
  - job_name: "devops-starter-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
