apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-starter-api
  namespace: devops-starter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-starter-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # CPU 70% 초과 시 스케일 아웃
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300    # 스케일 다운은 5분 안정화 후 실행
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0     # 스케일 업은 즉시 실행
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
