apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops-starter-api
  namespace: devops-starter
  labels:
    # kube-prometheus-stack이 이 레이블로 ServiceMonitor를 자동 발견
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: devops-starter-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
